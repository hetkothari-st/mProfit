services:
  postgres:
    image: postgres:15
    container_name: portfolioos-postgres
    environment:
      POSTGRES_DB: portfolioos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolioos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: portfolioos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # OnlyOffice DocumentServer — in-browser .docx/.xlsx/.pptx editing.
  # Browser hits this on port 8083 directly; the API talks to it on the same
  # host port (in dev). JWT_SECRET must match the API's ONLYOFFICE_JWT_SECRET.
  # Note: first boot pulls a ~2GB image, then ~30s warmup.
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: portfolioos-onlyoffice
    ports:
      - "8083:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-dev-onlyoffice-secret-change-me}
      # Allow the host machine to reach the API at host.docker.internal:3001
      # so DocServer can pull the source file and POST the saved bytes back.
      USE_UNAUTHORIZED_STORAGE: "true"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: portfolioos-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/portfolioos
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-dev-secret-change-me}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["full"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: portfolioos-web
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - api
    profiles: ["full"]

volumes:
  postgres_data:
  redis_data:
  onlyoffice_data:
  onlyoffice_log:
