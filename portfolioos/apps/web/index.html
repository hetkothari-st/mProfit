<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      try {
        var t = JSON.parse(localStorage.getItem('portfolioos.theme') || '{}');
        if (t.state && t.state.dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#022B54" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PortfolioOS" />
    <meta name="description" content="Multi-asset portfolio management for Indian investors" />
    <title>PortfolioOS — Multi-asset portfolio management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
